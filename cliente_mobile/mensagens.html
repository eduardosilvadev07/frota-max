<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>TMS — Mensagens</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="mensagens.css">
</head>
<body>
<div class="screen">
 
  <div class="screen-scroll">
 
    <!-- Header -->
    <div class="header">
      <div class="icon-btn">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </div>
      <span class="header-title">Mensagens</span>
      <div class="icon-btn">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
    </div>
 
    <!-- Barra de Pesquisa -->
    <div class="search-bar">
      <div class="search-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <input type="text" class="search-input" placeholder="Buscar conversa...">
    </div>
 
    <!-- Label da seção -->
    <div class="section-label">Recentes</div>
 
    <!-- Lista de Conversas -->
    <div class="conv-list">
 
      <!-- Conversa: Supervisor Júnior -->
      <a href="conversa.html" class="conv-item">
        <div class="conv-avatar-wrap">
          <div class="conv-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span class="online-dot"></span>
        </div>
        <div class="conv-body">
          <div class="conv-top">
            <span class="conv-name">Supervisor Júnior</span>
            <span class="conv-time">14:35</span>
          </div>
          <div class="conv-bottom">
            <span class="conv-preview">O cliente está no aguardo.</span>
            <span class="conv-badge">1</span>
          </div>
        </div>
      </a>
 
    </div><!-- fim conv-list -->
 
    <!-- Estado vazio (demais conversas) -->
    <div class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <p>Nenhuma outra conversa</p>
      <small>Suas mensagens aparecerão aqui</small>
    </div>
 
  </div><!-- fim screen-scroll -->
 
  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="inicio.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Início</span>
    </a>
    <a href="entregas.html" class="nav-item">
      <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      <span>Entregas</span>
    </a>
    <a href="mensagens.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="nav-badge">1</span>
      <span>Mensagens</span>
    </a>
    <a href="perfil.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Perfil</span>
    </a>
  </nav>
 
</div><!-- fim screen -->
</body>
</html>
